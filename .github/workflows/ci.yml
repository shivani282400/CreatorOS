name: CreatorOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # -------- BACKEND --------
      - name: Install backend dependencies
        working-directory: CreatorOS-backend
        run: npm install

      - name: Build backend
        working-directory: CreatorOS-backend
        run: npm run build

      # -------- FRONTEND --------
      - name: Install frontend dependencies
        working-directory: CreatorOS-frontend
        run: npm install

      - name: Build frontend
        working-directory: CreatorOS-frontend
        run: npm run build